[build]
builder = "NIXPACKS"
buildCommand = "if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; else python -m pip install -r backend/requirements.txt; fi"

[deploy]
startCommand = "if [ -d app ]; then uvicorn app.main:app --host 0.0.0.0 --port $PORT; else PYTHONPATH=backend uvicorn app.main:app --host 0.0.0.0 --port $PORT; fi"
