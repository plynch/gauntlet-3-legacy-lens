services:
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"

  api:
    build: ./backend
    environment:
      LEGACY_QDRANT_URL: http://qdrant:6333
      LEGACY_ALLOWED_ORIGINS: '["http://localhost:5173", "http://localhost:4173"]'
    depends_on:
      - qdrant
    ports:
      - "8000:8000"

  web:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      PORT: 4173
    depends_on:
      - api
    ports:
      - "4173:4173"
