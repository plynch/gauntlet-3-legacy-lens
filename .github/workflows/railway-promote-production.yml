name: Promote Staging Commit to Production (Railway)

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Commit SHA that is already validated in staging"
        required: true
        type: string

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_PRODUCTION_TOKEN }}
      PRODUCTION_API_HEALTH_URL: ${{ secrets.PRODUCTION_API_HEALTH_URL }}
      PRODUCTION_WEB_URL: ${{ secrets.PRODUCTION_WEB_URL }}
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Validate required secrets
        run: |
          if [ -z "${RAILWAY_TOKEN:-}" ]; then
            echo "Missing RAILWAY_PRODUCTION_TOKEN secret"
            exit 1
          fi
          if [ -z "${PRODUCTION_API_HEALTH_URL:-}" ]; then
            echo "Missing PRODUCTION_API_HEALTH_URL secret"
            exit 1
          fi
          if [ -z "${PRODUCTION_WEB_URL:-}" ]; then
            echo "Missing PRODUCTION_WEB_URL secret"
            exit 1
          fi

      - name: Deploy API to production
        working-directory: backend
        run: railway up --ci --service api-prod --environment production

      - name: Deploy frontend to production
        working-directory: frontend
        run: railway up --ci --service frontend-prod --environment production

      - name: Production smoke check API
        run: curl --fail --show-error --silent "$PRODUCTION_API_HEALTH_URL"

      - name: Production smoke check frontend
        run: curl --fail --show-error --silent --head "$PRODUCTION_WEB_URL"
