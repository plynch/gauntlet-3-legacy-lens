name: Deploy Staging (Railway)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_STAGING_TOKEN }}
      STAGING_API_HEALTH_URL: ${{ secrets.STAGING_API_HEALTH_URL }}
      STAGING_WEB_URL: ${{ secrets.STAGING_WEB_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Validate required secrets
        run: |
          if [ -z "${RAILWAY_TOKEN:-}" ]; then
            echo "Missing RAILWAY_STAGING_TOKEN secret"
            exit 1
          fi
          if [ -z "${STAGING_API_HEALTH_URL:-}" ]; then
            echo "Missing STAGING_API_HEALTH_URL secret"
            exit 1
          fi
          if [ -z "${STAGING_WEB_URL:-}" ]; then
            echo "Missing STAGING_WEB_URL secret"
            exit 1
          fi

      - name: Deploy API to staging
        working-directory: backend
        run: railway up --ci --service api-staging --environment staging

      - name: Deploy frontend to staging
        working-directory: frontend
        run: railway up --ci --service frontend-staging --environment staging

      - name: Staging smoke check API
        run: curl --fail --show-error --silent "$STAGING_API_HEALTH_URL"

      - name: Staging smoke check frontend
        run: curl --fail --show-error --silent --head "$STAGING_WEB_URL"
