name: Deploy Staging (Railway)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy API to staging
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_STAGING_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: railway up backend --path-as-root --ci --service api --environment staging --project "$RAILWAY_PROJECT_ID"

      - name: Deploy web to staging
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_STAGING_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: railway up frontend --path-as-root --ci --service web --environment staging --project "$RAILWAY_PROJECT_ID"

      - name: Staging smoke check API
        env:
          STAGING_API_HEALTH_URL: ${{ secrets.STAGING_API_HEALTH_URL }}
        run: curl --fail --show-error --silent "$STAGING_API_HEALTH_URL"

      - name: Staging smoke check web
        env:
          STAGING_WEB_URL: ${{ secrets.STAGING_WEB_URL }}
        run: curl --fail --show-error --silent --head "$STAGING_WEB_URL"
